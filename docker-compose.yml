version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jsherp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: jsh_erp
      MYSQL_USER: ${MYSQL_USER:-jsherp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jsherp123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./jshERP-boot/docs/jsh_erp.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - jsherp-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jsherp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-1234abcd}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - jsherp-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-1234abcd}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jsherp-boot:
    build:
      context: ./jshERP-boot
      dockerfile: Dockerfile
    container_name: jsherp-boot
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-1234abcd}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      TZ: Asia/Shanghai
    ports:
      - "${BOOT_PORT:-9999}:9999"
    volumes:
      - upload_data:/opt/jshERP/upload
      - boot_logs:/logs
      - ./jshERP-boot/application-docker.yml:/app/config/application-docker.yml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jsherp-net

  jsherp-web:
    build:
      context: ./jshERP-web
      dockerfile: Dockerfile
    container_name: jsherp-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - jsherp-boot
    networks:
      - jsherp-net

volumes:
  mysql_data:
  redis_data:
  upload_data:
  boot_logs:

networks:
  jsherp-net:
    driver: bridge
